<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Swile Calculator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #F2EEE6;
    --dark: #212C33;
    --gold: #C8A94A;
    --gray: #C0C0C0;
    --white: #ffffff;
    --black: #000000;
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  html, body {
    height: 100%; width: 100%;
    background: var(--cream);
    font-family: 'SF Pro Rounded', sans-serif;
    overflow: hidden;
  }

  @media (min-width: 600px) {
    body {
      background: #ddd9d1;
      display: flex;
      justify-content: center;
      align-items: center;
    }
  }

  .phone-wrapper {
    width: 100%;
    height: 100dvh;
    background: var(--cream);
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  @media (min-width: 600px) {
    .phone-wrapper {
      width: 420px;
      height: min(900px, 100dvh);
      border-radius: 40px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.25);
    }
  }

  /* ── SCREENS ── */
  .screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    transition: transform 0.5s cubic-bezier(0.4,0,0.2,1), opacity 0.5s ease;
  }
  .screen.hidden {
    transform: translateX(100%);
    opacity: 0;
    pointer-events: none;
  }

  /* ────────────────────
     SCREEN 1
  ──────────────────── */
  #screen1 { background: var(--cream); }

  /* Entrance animation keyframes */
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(28px); }
    to   { opacity:1; transform:translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity:0; }
    to   { opacity:1; }
  }
  @keyframes cardIn {
    from { opacity:0; transform:translateY(20px) scale(0.96); }
    to   { opacity:1; transform:translateY(0) scale(1); }
  }

  /* individual food items */
  .food-item {
    position: absolute;
    z-index: 1;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
  }
  .food-item img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }

  .food-item img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;
  transition: opacity 0.4s ease;  /* ← ajoute transition */
}
.food-item.falling img {
  opacity: 1 !important;
}


  .food-item.go {
    animation: foodAppear 0.6s cubic-bezier(0.22,1,0.36,1) forwards;
  }
  @keyframes foodAppear {
    from { opacity: 0; transform: scale(0.85) translateY(-10px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }
  /* falling animation — gravity feel, lands at bottom */
  .food-item.falling {
    transition: none !important;
    animation: foodFall var(--fall-duration, 1.1s) cubic-bezier(0.2, 0, 0.6, 1) forwards !important;
  }
  @keyframes foodFall {
    0%   {
      transform: var(--fall-start-transform) translateY(0px) rotate(0deg);
      opacity: 1;
      animation-timing-function: cubic-bezier(0.4, 0, 1, 1);
    }
    60%  {
      transform: var(--fall-start-transform) translateY(calc(var(--fall-distance) * 0.72)) rotate(calc(var(--fall-rotate) * 0.6));
      opacity: 1;
      animation-timing-function: cubic-bezier(0.2, 0, 0.8, 1);
    }
    85%  {
      transform: var(--fall-start-transform) translateY(calc(var(--fall-distance) * 1.03)) rotate(calc(var(--fall-rotate) * 1.08));
      opacity: 1;
      animation-timing-function: cubic-bezier(0, 0, 0.4, 1);
    }
    100% {
      transform: var(--fall-start-transform) translateY(var(--fall-distance)) rotate(var(--fall-rotate));
      opacity: 1;
    }
  }

  /* card wrapper — positions at 115px, full-width so flex can center */
  .card-wrapper {
    position: absolute;
    top: 115px;
    left: 0; right: 0;
    display: flex;
    justify-content: center;
    z-index: 10;
    opacity: 0;
    perspective: 800px;
  }
  .card-wrapper.go { animation: cardIn 0.65s cubic-bezier(0.22,1,0.36,1) forwards; }
  .card-container {
    width: min(82%, 320px);
    aspect-ratio: 1.6 / 1;
    border-radius: clamp(12px, 3vw, 20px);
    box-shadow: -1px 4px 10px rgba(106, 80, 43, 0.10), -4px 17px 18px rgba(106, 80, 43, 0.09), -9px 39px 24px rgba(106, 80, 43, 0.05), -16px 69px 28px rgba(106, 80, 43, 0.01), -25px 108px 31px rgba(106, 80, 43, 0);
    overflow: hidden;
    position: relative;
  }
  #cardFace1, #cardFace2 {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    transition: opacity 0.25s ease;
  }
  /* sheen overlay reacts to tilt */
  .card-sheen {
    position: absolute;
    inset: 0;
    border-radius: inherit;
    pointer-events: none;
    background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.18) 0%, transparent 70%);
    opacity: 0;
    transition: opacity 0.15s ease;
    mix-blend-mode: screen;
  }
  .card-container img {
    width:100%; height:100%;
    object-fit:cover;
    display:block;
  }

  /* content below card — padding-top clears card (115px top + ~200px height + 56px gap = 371px) */
  .screen1-content {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    gap: clamp(14px, 3vh, 28px);
    padding: 371px clamp(20px, 7vw, 40px) clamp(28px, 5vh, 52px);
    overflow: hidden;
    position: relative;
    z-index: 5;
  }

  .main-title {
    text-align: center;
    color: var(--dark);
    font-size: 44px;
    font-family: 'SF Pro Rounded';
    font-weight: 600;
    line-height: 1.15;
    letter-spacing: -0.5px;
    opacity: 0;
  }
  .main-title.go { animation: fadeUp 0.55s cubic-bezier(0.22,1,0.36,1) forwards; }

  /* Input row — input + € symbol side by side */
  .input-row {
    display: flex;
    align-items: baseline;
    justify-content: center;
    gap: 4px;
    width: 100%;
    opacity: 0;
  }
  .input-row.go { animation: fadeUp 0.55s cubic-bezier(0.22,1,0.36,1) forwards; }

  #amountInput {
    -moz-appearance: textfield;
    appearance: textfield;
    background: transparent;
    border: none;
    outline: none;
    text-align: right;
    font-size: clamp(36px, 12vw, 64px);
    font-weight: 500;
    font-family: 'Nunito', sans-serif;
    color: var(--dark);
    width: 2ch;       /* resized dynamically by JS */
    min-width: 2ch;
    max-width: 72vw;
    caret-color: var(--gold);
    letter-spacing: -2px;
  }
  /* hidden mirror for auto-sizing */
  #inputMirror {
    position: absolute;
    visibility: hidden;
    white-space: pre;
    font-size: clamp(36px, 12vw, 64px);
    font-weight: 700;
    font-family: 'SF Pro Rounded', sans-serif;
    letter-spacing: -2px;
    pointer-events: none;
  }
  #amountInput::-webkit-outer-spin-button,
  #amountInput::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  #amountInput::placeholder { color: var(--gray); }

  .euro-symbol {
    font-size: clamp(28px, 9vw, 50px);
    font-weight: 500;
    font-family: 'Sf Pro Rounded', sans-serif;
    color: var(--gray);
    letter-spacing: -1px;
    line-height: 1;
    transition: color 0.3s;
    flex-shrink: 0;
  }
  .euro-symbol.active { color: var(--gold); }

  .input-underline {
    height: 2px;
    width: clamp(120px, 50%, 220px);
    background: linear-gradient(90deg, transparent, var(--gray), transparent);
    transition: background 0.3s;
    margin-top: 2px;
  }

  .calc-btn {
    display: block;
    background: var(--black);
    color: var(--white);
    border: none;
    border-radius: 100px;
    padding: clamp(12px, 2vh, 17px) clamp(32px, 9vw, 52px);
    font-size: clamp(15px, 3.5vw, 18px);
    font-weight: 500;
    font-family: 'Nunito', sans-serif;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(0,0,0,0.22);
    min-width: clamp(150px, 48%, 210px);
    opacity: 0;
  }
  .calc-btn:active { transform: scale(0.96); }
  .calc-btn.go { animation: fadeUp 0.55s cubic-bezier(0.22,1,0.36,1) forwards; }

    /* ────────────────────
     SCREEN 2
  ──────────────────── */
  #screen2 { background: var(--cream); }

  .screen2-header {
    padding: clamp(28px, 6vh, 56px) clamp(20px, 6vw, 32px) 0;
    flex-shrink: 0;
  }
  .back-btn {
    width: 42px; height: 42px;
    border-radius: 50%;
    background: rgba(0,0,0,0.07);
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; color: var(--dark);
    font-family: 'Nunito', sans-serif;
    transition: background 0.15s;
  }
  .back-btn:active { background: rgba(0,0,0,0.14); }

  .screen2-body {
    flex: 1;
    padding: 0 clamp(24px, 7vw, 40px) clamp(24px, 5vh, 48px);
    display: flex; flex-direction: column;
    justify-content: center;
    gap: 0;
  }

  /* Big number */
  .result-hero {
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    gap: 0;
    font-family: 'SF Pro Rounded';
    opacity: 0; 
    transform: translateY(24px);
    transition: opacity 0.55s cubic-bezier(0.22,1,0.36,1),
                transform 0.55s cubic-bezier(0.22,1,0.36,1);
  }
  .result-hero.visible { opacity:1; transform:translateY(0); }

  .result-per-day {
    color: var(--dark);
    font-size: clamp(64px, 22vw, 96px);
    font-family: 'SF Pro Rounded';
    font-weight: 500; 
    letter-spacing: -4px; 
    line-height: 1;
  }

  .result-caption {
    margin-top: clamp(10px, 2vh, 18px);
    text-align: center;
    font-size: 44px;
    font-family: 'SF Pro Rounded';
    font-weight: 500;
    color: #444444;
    line-height: 1.15;
  }
  .result-caption .dimmed { color: #E5352D; font-weight: 500; }

  /* Toggle */
  .toggle-row {
    margin-top: clamp(20px, 4vh, 32px);
    display: flex; 
    align-items: center; 
    justify-content: center;
    gap: 12px;
    opacity: 0; 
    transform: translateY(14px);
    transition: opacity 0.5s ease 0.3s, transform 0.5s ease 0.3s;
  }
  .toggle-row.visible { opacity:1; transform:translateY(0); }

  .toggle-label {
    font-size: clamp(13px, 3.5vw, 18px);
    font-weight: 500; 
    color: var(--dark);
  }
  .toggle-wrap { position: relative; width: 52px; height: 30px; flex-shrink: 0; }
  .toggle-wrap input { display: none; }
  .toggle-slider {
    position: absolute; inset: 0;
    background: #ccc; border-radius: 100px; cursor: pointer;
    transition: background 0.25s ease;
  }
  .toggle-slider::before {
    content: '';
    position: absolute;
    width: 24px; height: 24px; left: 3px; top: 3px;
    background: white; border-radius: 50%;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    transition: transform 0.25s cubic-bezier(0.22,1,0.36,1);
  }
  .toggle-wrap input:checked + .toggle-slider { background: #3DC152; }
  .toggle-wrap input:checked + .toggle-slider::before { transform: translateX(22px); }


</style>
</head>
<body>
<div class="phone-wrapper">

  <!-- SCREEN 1 -->
  <div class="screen" id="screen1">



    <div class="card-wrapper" id="s1Card">
      <div class="card-container" id="bankCard">
        <div class="card-sheen" id="cardSheen"></div>
        <img src="bank-card.png" alt="Carte Swile" id="cardFace1" />
        <img src="cb-burns.png" alt="Carte Swile 2" id="cardFace2" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;opacity:0;"/>
        <img src="cb-picsou.png" id="cardFace3"/>
</div>
    </div>

    <div class="screen1-content">
      <h1 class="main-title" id="s1Title">Combien y a‑t‑il<br>sur ta Swile&nbsp;?</h1>
      <div class="input-row" id="s1InputRow">
        <input type="text" inputmode="decimal" id="amountInput" placeholder="0,00" autocomplete="off" />
        <span class="euro-symbol" id="euroSymbol">€</span>
      </div>

      <button class="calc-btn" id="s1Btn" onclick="calculate()">Calculer</button>
    </div>

  </div>

  <!-- SCREEN 2 -->
  <div class="screen hidden" id="screen2">

    <div class="screen2-header">
      <button class="back-btn" onclick="goBack()"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16"><path d="M7.78 12.53a.75.75 0 0 1-1.06 0L2.47 8.28a.75.75 0 0 1 0-1.06l4.25-4.25a.751.751 0 0 1 1.042.018.751.751 0 0 1 .018 1.042L4.81 7h7.44a.75.75 0 0 1 0 1.5H4.81l2.97 2.97a.75.75 0 0 1 0 1.06Z"></path></svg></button>
    </div>

    <div class="screen2-body" id="screen2Body">

      <!-- Big number + caption -->
      <div class="result-hero" id="resultCard">
        <div class="result-per-day" id="resultPerDay">—</div>
        <div class="result-caption">
          <span class="dimmed">par jour </span>gardera<br>ta swile pleine
        </div>
      </div>

      <!-- Toggle "Exclure les weekends" -->
      <div class="toggle-row" id="toggleRow">
        <label class="toggle-wrap">
          <input type="checkbox" id="weekendToggle" checked onchange="recalc()" />
          <span class="toggle-slider"></span>
        </label>
        <span class="toggle-label">Exclure les weekends</span>
      </div>


    </div>
  </div>

  <span id="inputMirror"></span>

    <div class="food-item" id="food-gnocchi1"
         style="top:-20px; left:-30px; width:140px; transform: rotate(8deg); opacity:0;
                --fall-start-transform: rotate(8deg); --fall-rotate: 8deg;">
      <img src="plat-picard.png" alt="" style="opacity:0.5;" />
    </div>
    <div class="food-item" id="food-poke"
         style="top:60px; left:-40px; width:160px; transform: rotate(-5deg); opacity:0;
                --fall-start-transform: rotate(-5deg); --fall-rotate: -5deg;">
      <img src="poke.png" alt="" style="opacity:0.5;" />
    </div>
    <div class="food-item" id="food-jeanbeurre"
         style="top:-20px; left:90px; width:150px; transform: rotate(-12deg); opacity:0;
                --fall-start-transform: rotate(-12deg); --fall-rotate: -12deg;">
      <img src="sac-jambon.png" alt="" style="opacity:0.5;" />
    </div>
    <div class="food-item" id="food-kebab"
         style="top:-15px; left:220px; width:120px; transform: rotate(15deg); opacity:0;
                --fall-start-transform: rotate(15deg); --fall-rotate: 15deg;">
      <img src="galika.png" alt="" style="opacity:0.5;" />
    </div>
    <div class="food-item" id="food-onigiri"
         style="top:-10px; left:310px; width:145px; transform: rotate(-8deg); opacity:0;
                --fall-start-transform: rotate(-8deg); --fall-rotate: -8deg;">
      <img src="onigri.png" alt="" style="opacity:0.5;" />
    </div>
</div>
<script>
  function fmt(n) {
    return n.toLocaleString('fr-FR', {minimumFractionDigits:2, maximumFractionDigits:2}) + '€';
  }

  // getWorkingDaysUntilNextRecharge is defined in recalc block above

  /* Entrance animation — staggered */
  function runEntrance() {
    const steps = [
      { id:'food-gnocchi1',  delay:0   },
    { id:'food-jeanbeurre',delay:40  },
    { id:'food-kebab',     delay:80  },
    { id:'food-onigiri',   delay:120 },
    { id:'food-poke',      delay:60  },
      { id:'s1Card',  delay:130 },
      { id:'s1Title', delay:270 },
      { id:'s1InputRow', delay:380 },
      { id:'s1Btn',   delay:470 },
    ];
    steps.forEach(({ id, delay }) => {
      setTimeout(() => document.getElementById(id).classList.add('go'), delay);
    });
  }

  /* Countdown from `from` to `to` over `duration` ms */
  function animateCount(from, to, duration, onUpdate, onDone) {
    const start = performance.now();
    function ease(t) { return 1 - Math.pow(1 - t, 3); }
    (function tick(now) {
      const t = Math.min((now - start) / duration, 1);
      onUpdate(from + (to - from) * ease(t));
      if (t < 1) requestAnimationFrame(tick);
      else onDone();
    })(performance.now());
  }

  /* Sanitise input: only digits and , or . */
  function resizeInput() {
    const inp    = document.getElementById('amountInput');
    const mirror = document.getElementById('inputMirror');
    const val    = inp.value || inp.placeholder;
    mirror.textContent = val;
    // sync font size dynamically
    const fs = getComputedStyle(inp).fontSize;
    mirror.style.fontSize = fs;
    inp.style.width = Math.ceil(mirror.offsetWidth) + 2 + 'px';
  }

  document.getElementById('amountInput').addEventListener('input', function() {
    this.value = this.value.replace(/[^0-9.,]/g, '');
    resizeInput();
  });

  window.addEventListener('resize', resizeInput);
  document.getElementById('amountInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') calculate();
  });

  const underline = document.getElementById('inputUnderline');
  document.getElementById('amountInput').addEventListener('focus', () => {
    underline.style.background = 'linear-gradient(90deg, transparent, #C8A94A, transparent)';
    document.getElementById('euroSymbol').classList.add('active');
  });
  document.getElementById('amountInput').addEventListener('blur', () => {
    underline.style.background = 'linear-gradient(90deg, transparent, #C0C0C0, transparent)';
    document.getElementById('euroSymbol').classList.remove('active');
  });

  function calculate() {
    const raw    = document.getElementById('amountInput').value.replace(',', '.');
    const amount = parseFloat(raw);
    if (!raw || isNaN(amount) || amount <= 0) { alert('Il faut taper le montant avant petit curry'); return; }

    _lastAmount = amount;
    const excludeWeekends = document.getElementById('weekendToggle').checked;
    const workDaysLeft = getWorkingDaysUntilNextRecharge(excludeWeekends);
    const perDay = workDaysLeft > 0 ? amount / workDaysLeft : 0;

    // trigger food fall — gravity physics, staggered
    const wrapper  = document.querySelector('.phone-wrapper');
    const wrapperH = wrapper.offsetHeight;
    const wrapRect = wrapper.getBoundingClientRect();

    ['food-gnocchi1','food-jeanbeurre','food-kebab','food-onigiri','food-poke'].forEach((id, i) => {
      const el = document.getElementById(id);
      if (!el) return;

      const rect       = el.getBoundingClientRect();
      const itemTop    = rect.top  - wrapRect.top;   // top of item relative to wrapper
      const itemH      = rect.height;

      // land so ~40% of the item is still visible at the bottom
      const distance = wrapperH - itemTop - itemH * 0.4;

      const dur        = (0.9 + Math.random() * 0.4).toFixed(2) + 's';

      // strong rotation: 25–50deg, random direction
      const sign       = Math.random() > 0.5 ? 1 : -1;
      const endRotate  = (sign * (25 + Math.random() * 25)).toFixed(1);

      el.style.setProperty('--fall-duration', dur);
      el.style.setProperty('--fall-distance', distance + 'px');
      el.style.setProperty('--fall-rotate',   endRotate + 'deg');

      setTimeout(() => el.classList.add('falling'), i * 90 + Math.random() * 50);
    });

    document.getElementById('screen1').classList.add('hidden');
    document.getElementById('screen2').classList.remove('hidden');
    document.getElementById('screen2Body').scrollTop = 0;

    const rc = document.getElementById('resultCard');
    const tr = document.getElementById('toggleRow');
    rc.classList.remove('visible');
    tr.classList.remove('visible');

    document.getElementById('resultPerDay').textContent = fmt(amount);

    setTimeout(() => rc.classList.add('visible'), 80);
    setTimeout(() => {
      tr.classList.add('visible');
      animateCount(amount, perDay, 1100,
        val => { document.getElementById('resultPerDay').textContent = fmt(val); },
        ()  => { document.getElementById('resultPerDay').textContent = fmt(perDay); }
      );
    }, 300);
  }

  let _lastAmount = 0;

  function getWorkingDaysUntilNextRecharge(excludeWeekends) {
    const now   = new Date();
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const day   = today.getDate();
    let endYear  = today.getFullYear();
    let endMonth = today.getMonth();
    if (day >= 15) {
      endMonth++;
      if (endMonth > 11) { endMonth = 0; endYear++; }
    }
    const end = new Date(endYear, endMonth, 14);
    let count = 0;
    const cursor = new Date(today);
    while (cursor <= end) {
      const wd = cursor.getDay();
      const isWeekend = (wd === 0 || wd === 6);
      if (!excludeWeekends || !isWeekend) count++;
      cursor.setDate(cursor.getDate() + 1);
    }
    return count;
  }

  function recalc() {
    if (!_lastAmount) return;
    const excludeWeekends = document.getElementById('weekendToggle').checked;
    const workDaysLeft = getWorkingDaysUntilNextRecharge(excludeWeekends);
    const perDay = workDaysLeft > 0 ? _lastAmount / workDaysLeft : 0;
    document.getElementById('resultPerDay').textContent = fmt(perDay);
    animateCount(_lastAmount, perDay, 700,
      val => { document.getElementById('resultPerDay').textContent = fmt(val); },
      ()  => { document.getElementById('resultPerDay').textContent = fmt(perDay); }
    );
  }

  function goBack() {
    document.getElementById('screen2').classList.add('hidden');
    document.getElementById('screen1').classList.remove('hidden');
    // reset food items back to original position
    ['food-gnocchi1','food-jeanbeurre','food-kebab','food-onigiri','food-poke'].forEach(id => {
      const el = document.getElementById(id);
      if (!el) return;
      el.classList.remove('falling');
      el.style.removeProperty('--fall-distance');
      void el.offsetWidth; // force reflow to restart animations
    });
  }

  window.addEventListener('load', () => {
    resizeInput();
    setTimeout(runEntrance, 60);
  });

            /* ── CARD FLIP ── */
  (function() {
    const card  = document.getElementById('bankCard');
    const faces = [
      document.getElementById('cardFace1'),
      document.getElementById('cardFace2'),
      document.getElementById('cardFace3'),
    ].filter(Boolean);
    if (!card || !faces.length) return;

    faces.forEach(f => { f.style.transform = ''; });

    let currentFace = 0;
    let dragging    = false;
    let startX      = 0;
    let lastX       = 0;
    let lastTime    = 0;
    let prevX       = 0;
    let prevTime    = 0;
    let flipping    = false;  // block input during flip animation

    function showFace(idx) {
      faces.forEach((f, i) => { f.style.opacity = i === idx ? '1' : '0'; });
    }

    function rotateTo(deg, duration, easing, cb) {
      card.style.transition = duration > 0 ? `transform ${duration}ms ${easing}` : 'none';
      card.style.transform  = `perspective(1000px) rotateY(${deg}deg)`;
      if (cb) setTimeout(cb, duration);
    }

    function doFlip(dir) {
      if (flipping) return;
      flipping = true;

      // Step 1: rotate to edge (90°) — fast
      rotateTo(dir * 90, 160, 'ease-in', () => {
        // Step 2: swap face while invisible, jump to -90°
        currentFace = (currentFace + 1) % faces.length;
        showFace(currentFace);
        rotateTo(dir * -90, 0, 'linear', () => {
          // Step 3: rotate back to 0 — fast
          rotateTo(0, 160, 'ease-out', () => {
            flipping = false;
          });
        });
      });
    }

    function cancelFlip() {
      rotateTo(0, 250, 'cubic-bezier(0.22,1,0.36,1)');
    }

    showFace(0);

    function startDrag(x) {
      if (flipping) return;
      dragging = true;
      startX = lastX = prevX = x;
      lastTime = prevTime = Date.now();
    }

    function moveDrag(x) {
      if (!dragging || flipping) return;
      const now   = Date.now();
      prevX       = lastX;
      prevTime    = lastTime;
      lastX       = x;
      lastTime    = now;

      const dx    = x - startX;
      const cardW = card.getBoundingClientRect().width;
      // Direct 1:1 mapping but clamped to ±85°
      const deg   = Math.max(-85, Math.min(85, (dx / cardW) * 150));
      card.style.transition = 'none';
      card.style.transform  = `perspective(1000px) rotateY(${deg}deg)`;
    }

    function endDrag(x) {
      if (!dragging) return;
      dragging = false;
      if (flipping) return;

      const dx     = x - startX;
      const dt     = Math.max(1, lastTime - prevTime);
      const vel    = (lastX - prevX) / dt; // px/ms
      const cardW  = card.getBoundingClientRect().width;

      // Commit flip if: fast swipe OR dragged > 30% of card width
      if (Math.abs(vel) > 0.3 || Math.abs(dx) > cardW * 0.3) {
        doFlip(dx > 0 ? 1 : -1);
      } else {
        cancelFlip();
      }
    }

    /* MOUSE */
    card.addEventListener('mousedown',  (e) => { startDrag(e.clientX); e.preventDefault(); });
    window.addEventListener('mousemove',(e) => { moveDrag(e.clientX); });
    window.addEventListener('mouseup',  (e) => { endDrag(e.clientX); });

    /* TOUCH */
    card.addEventListener('touchstart', (e) => {
      startDrag(e.touches[0].clientX);
    }, { passive: true });
    card.addEventListener('touchmove', (e) => {
      if (!e.touches[0]) return;
      moveDrag(e.touches[0].clientX);
      e.preventDefault();
    }, { passive: false });
    card.addEventListener('touchend', () => { endDrag(lastX); });
  })();
</script>
</body>
</html>
